<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#1e3a5f" rx="64"/>
  
  <!-- Bible Book -->
  <g transform="translate(256, 256)">
    <!-- Book Cover -->
    <rect x="-120" y="-140" width="240" height="280" fill="#d4af37" rx="8"/>
    
    <!-- Book Spine Shadow -->
    <rect x="-120" y="-140" width="20" height="280" fill="#b8941f" rx="8 0 0 8"/>
    
    <!-- Book Pages -->
    <rect x="-110" y="-130" width="220" height="260" fill="#f5f5dc" rx="4"/>
    
    <!-- Cross Symbol -->
    <g transform="translate(0, -20)">
      <!-- Vertical bar -->
      <rect x="-12" y="-60" width="24" height="120" fill="#1e3a5f" rx="4"/>
      <!-- Horizontal bar -->
      <rect x="-50" y="-30" width="100" height="24" fill="#1e3a5f" rx="4"/>
    </g>
    
    <!-- Decorative lines (pages) -->
    <line x1="-90" y1="-100" x2="90" y2="-100" stroke="#d4af37" stroke-width="2" opacity="0.3"/>
    <line x1="-90" y1="-80" x2="90" y2="-80" stroke="#d4af37" stroke-width="2" opacity="0.3"/>
    <line x1="-90" y1="80" x2="90" y2="80" stroke="#d4af37" stroke-width="2" opacity="0.3"/>
    <line x1="-90" y1="100" x2="90" y2="100" stroke="#d4af37" stroke-width="2" opacity="0.3"/>
    
    <!-- Text: BQ -->
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#d4af37" text-anchor="middle">BQ</text>
  </g>
</svg>